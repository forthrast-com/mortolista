]
date = "2002-11-25"
date_estimated = false
category = "Postmortem"
summary = "When The Games Kitchen began Wireless Pets, WAP (Wireless Access Protocol) was as much in its infancy as the company and the publisher was. Wireless Pets was an ambitious title. We'd never done anything that big or complex, we had to expand the company for this title, and DB had to expand their platform to handle it. Heck, we weren't even sure if WAP (or, more accurately, the usually poor implementation of WAP found on the new devices) could handle it. But we did it anyway, and it became the biggest WAP game in Europe, with over 15 million minutes of airtime on 18 operators. The SMS version looks set to repeat that success. This is the story of both WAP and SMS versions."
