]
date = "2000-12-06"
date_estimated = false
category = "Postmortem"
summary = "Deus Ex shipped in June 2000. Sales were, and continue to be, strong, worldwide. Critical response (with one or two notable exceptions) has been positive, and the game has already won several \"best of year\" awards in the U.S., the U.K. and Germany. A lot of stuff went right on Deus Ex; and a lot of stuff went wrong. In this article, Warren Spector looks at the design philosophies that led to the creation of Deus Ex, technology licensing, scheduling methodologies and why they all failed, management structures and team building techniques, and the public relations triumphs and nightmares that often seemed as if they'd have as much impact on our success as the quality of our work."
