summary = "Make a simple, addictive, old-school game, based on herding. To this add the notion that, although the graphics were to be of light, fluffy animals, the situations would be where you find humans behaving in the dumbest, sheep-like manner. Additionally, it would be a sprite-based, god's-eye-view game that could be played on a 486 PC with a 2MB 2D graphics card. Minds Eye had a concept that would sell to both sexes, be played by all ages, and be banned in no countries. Had they found the gaming Holy Grail? Andrew Evans recounts the trials and tribulations the Sheep team faced to bring this game to the shelves."
