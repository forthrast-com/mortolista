summary = "Just over two years ago Baldur's Gate was released. It was the culmination of nearly 90 man-years of work by a number of inexperienced, but very talented and creative individuals at BioWare, who had only one previous title (Shattered Steel) to their credit. After the resounding success of Baldur's Gate, BioWare began the development of Baldur's Gate II and set out to prove the magic of Baldur's Gate could not only be repeated, but that a great game could be made even better. In this article, Dr. Ray Muzyka discusses some of the strategies his team employed during the development of Baldur's Gate II."
