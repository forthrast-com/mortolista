[[postmortem]]
id = "131881"
title = "Mobile Game Postmortem: Ngame's Chop Suey Kung Fu"
game = "Mobile Game Postmortem: Ngame's Chop Suey Kung Fu"
authors = [
    "Matt Kelland",
]
date = "2001-09-17"
date_estimated = false
category = "Postmortem"
summary = "When Ngame moved into the WAP market they concentrated on big, innovative multi-player titles like Alien Fish Exchange, Merchant Princes, and DataClash. However, it was immediately apparent that, successful as these titles were, they were almost too big for a mobile phone. After talking with carriers about what they wanted, Ngame realised that we were going to need a suite of smaller titles to bulk up their portfolio. The entire spec for Chop Suey Kung Fu was written in half an hour, on less than one side of letter paper. It was multi-player. It was a popular genre. And lastly, it was really, really easy for the player to understand. This punched every carriers buttons. The marketing guys loved it. Chop Suey Kung Fu has become one of Ngames biggest successes, frequently outperforming the much bigger games, and is now one of the worlds most popular wireless games."
