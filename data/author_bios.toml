[[author_bio]]
id = "131643"
bio = "André Vrignaud has worked in the computer gaming industry since 1990. Most recently, he's worked at SSI and TEN, where he produced much of their online content and direction. He wishes thank everyone involved with DSO, with special thanks to the Lead Scriptor/Designer Richard Donnelly, TEN's RPG Producers Alex Beltramo and Don Hupp, and in particular, all of the thousands of external beta-testers. He can be reached at andre@null.net ."

[[author_bio]]
id = "131746"
bio = "Richard Wyckoff was a designer on Trespasser who has worked previously at Looking Glass Technologies in small roles on projects like Flight Unlimited and Terra Nova . He is currently applying what he learned from Trespasser on an unannounced project at Knowledge Adventure . He can be reached at richw@loonygames.com ."

[[author_bio]]
id = "131762"
bio = "Tom Leonard was the lead programmer for Thief: The Dark Project , writing the AI and core architecture of the game. He lives in the Boston area. Tom has been at Looking Glass for three-and-a-half years, prior to which he spent seven years working on C++ development tools at Zortech and Symantec. He is currently working on next-generation technologies, and can be reached at toml@lglass.com ."

[[author_bio]]
id = "131775"
bio = "Project leader Collette Michaud and lead programmer Jon Blossom were two of the first employees at LucasLearning. They designed and built Star Wars DroidWorks with the help of an incredible team. Collette can be reached at collette@lucaslearning.com , Jon at blossom@aya.yale.edu ."

[[author_bio]]
id = "131788"
bio = "When Craig Derrick isn’t off buying DVDs, he’s often writing to Jason Leighton about his weather woes and trying to convince him that all he really needs to do is to stop programming and go outside. If you need a motivational speaker or if you have a problem and no one else can help, write to craig@outrage.com ."

[[author_bio]]
id = "131809"
bio = "Michael Saladino was lead programmer on Presto Studio's Star Trek: Hidden Evil ."

[[author_bio]]
id = "131811"
bio = "Jason VandenBerghe currently resides in Bothell, Washington. He is Founder & CEO of Corporation X, an independent games publisher dedicated to making opportunities for independent developers who want to bring their games to market. He can be reached at jasonv@darklord.com ."

[[author_bio]]
id = "131813"
bio = "Jonathan Chey was the project manager and a programmer on System Shock 2 . He is also one of the co-founders of Irrational Games. Prior to founding Irrational Games, he worked at Looking Glass Studios and prior to that he received his Ph.D. in Cognitive Science from Boston University. He is currently working on his tan back in his hometown of Sydney, Australia. He can be reached at jon@irrational-games.com ."

[[author_bio]]
id = "131814"
bio = "Beyond the role of volcanic guitarist and avid jai alai analyst, Clancy Imislund enjoys all aspects of engine design including 3D graphics, AI, tools, and multiplayer integration. For Heavy Gear II , he was responsible for the AI, scripting system, and tools development. Contact him at cimislund@activision.com ."

[[author_bio]]
id = "131823"
bio = "Art Min is Fireteam ’s project leader and the cofounder of Multitude. He lives in the San Francisco Bay Area. Art relaxes by hitting a little black object on a cold surface and attempting to learn how to paint, though not at the same time (yet). He can be reached at minman@multitude.com or minman@alum.mit.edu."

[[author_bio]]
id = "131824"
bio = "Didier Malenfant is a programmer at Shiny Entertainment. Even being French he is only mildly rude and enjoys snowboarding, driving his yellow car, researching in all aspects of 3D programming and running Linux boxes. He can be reached at dids@shiny.com ."

[[author_bio]]
id = "131829"
bio = "Brian Upton is the director of production design at Red Storm Entertainment. He as a Masters degree in computer science from the University of North Carolina at Chapel Hill and spent ten years as a graphics programmer before making the jump to full- time game designer. He can be reached at brian.upton@redstorm.com ."

[[author_bio]]
id = "131843"
bio = "Jim Napier was SWAT3 's lead programmer and wrote the game's graphics engine and networking code. He's now at Microsoft leading the development of a new XBox title. He spends his spare time playing Total Annihilation and trying to convince his wife why it's good for his career. While he's waiting for his Buzzsaw to finish building, he checks his email at jimn@highstream.net ."

[[author_bio]]
id = "131844"
bio = "Matt Pritchard is busy trying to be a modern renaissance man. When not working, he can be found with his family or playing with his collection of antique video games and computers. He can be reached at mpritchard@ensemblestudios.com ."

[[author_bio]]
id = "131595"
bio = "Rade Stojsavljevic was the producer for Tiberian Sun the expansion pack Firestorm . Before coming to Westwood, he worked on military simulations and adventure games at various small development houses. When he’s not out getting doughnuts to bribe the team with, you can usually reach him at rade@westwood.com ."

[[author_bio]]
id = "131586"
bio = "Stuart Denman was the lead programmer on Drakan and is a co-founder of Surreal Software. This was his first “real” job following four years as a student of computer engineering at the University of Washington. After scouting around Europe on a post- Drakan vacation, he is currently back at work developing Surreal’s next 3D engine technology. He can be reached at stu (at) surreal (dot) com."

[[author_bio]]
id = "131577"
bio = "For almost all backend services, you will have to take into consideration a similar set of design decisions , and you will need to handle scalability and failure cases elegantly in order to keep your user base happy. You can contact Yahn Bernier at yahn@valvesoftware.com ."

[[author_bio]]
id = "131569"
bio = "Brandon \"GreenMarine\" Reinhart is a 21-year-old programmer formerly with Epic Games Inc. Unreal Tournament was his first game after being recruited by Epic from the Unreal and Quake 2 mod community. He is obsessed with games, game programming, and game design. When he isn't playing games, he can be found reading Michael Moorcock, painting miniatures, or listening to the latest in Norwegian black metal. Blodu Ok Jarna!"

[[author_bio]]
id = "131563"
bio = "Jamie has been programming games in Los Angeles and San Diego for nine years. He still makes a lot of mistakes. Check out his website at http://jfristrom.home.mindspring.com/ or e-mail him at jfristrom@iname.com."

[[author_bio]]
id = "131547"
bio = "Jamie has been programming games in Los Angeles and San Diego for nine years. He still makes a lot of mistakes. Check out his website at http://jfristrom.home.mindspring.com/ or e-mail him at jfristrom@iname.com."

[[author_bio]]
id = "131523"
bio = "Now that we've shipped, the reviews seem to fall into two categories -- those that begin with some statement implying that Warren Spector makes games all by himself (which is silly), and those that begin with some statement proclaiming that Deus Ex couldn't possibly have been made by Ion Storm (also silly). Silly or not, there's a level on which we're still trying to live down our past, at least in terms of the media's perception of our game and the company that paid the bills here."

[[author_bio]]
id = "131474"
bio = "For instance, we wanted the possibility of adding any features needed, integrating any kind of libraries and performing any modification users demanded. Our close clients can get all source and can do their own case by case modifications, trimming and extending for their game titles…"

[[author_bio]]
id = "131470"
bio = "Moderngroove - The Ministry of Sound Edition Publisher : UBI Soft Europe Full-Time Developers: 4 + contractor (Sasa Djolic, Leonard Paul, Chakib Ouhajjou, Burton Samograd, Brian Ka Chun Yu) Musicians: 1 + contractor (Jon Morley, Bruce Young) Artists: 4 (Lasko Konopa, Calvin Yu, Martin Konopa, Ryan Castle) Budget: Approx $1 million Length of Development: 8 months Release Date: July 16, 2001 Platform: Sony Playstation 2 Hardware Used: 533MHz Pentium IIs with 128MB RAM, 30 GB hard drives, Matrox Dual Head Software Use…"

[[author_bio]]
id = "131376"
bio = "After being so well received in the UK with help from a cult film licence we could only hope that the game would hold it's own in other territories. This was confirmed by excellent reviews from the rest of Europe and the USA (5/5 OPM), the game even inspired some people to watch the film for the very first time."

[[author_bio]]
id = "131370"
bio = "Most seriously, the music we bought with the copyright was not fully owned by the show’s film producer. The problem wasn’t found out until the production went to the final period. As a result, some music that the game designers most wanted was not available for use in the game. You can guess how disappointed the team was when we got the news."

[[author_bio]]
id = "131355"
bio = "Fairly Evil Software is: Evan Beeton ebeeton@cfl.rr.com Jonathan Burnside jon_burnside@hotmail.com Travis George ts_george@hotmail.com Brian Kaiser kaisercade@yahoo.com Andrew Schiele dresschiele@earthlink.net"

[[author_bio]]
id = "131327"
bio = "Though BioWare considers Neverwinter Nights a critically and commercially successful product by most generally accepted standards, it is still far from perfect in our eyes. We try hard to learn from our mistakes, and when we run across a hurdle or a challenge we try to avoid getting caught in the details of what happened and focus on the solution. We cast a critical eye on everything from process to user perception…"

[[author_bio]]
id = "131287"
bio = "There were a few days where a large number of system changes were checked in. On these days, numerous full recompiles were required, and the team spent a lot of time waiting. Long compile times were also an issue in the days leading up to milestones as internal QA spent a lot of time waiting for new builds with the fixes needed."

[[author_bio]]
id = "131251"
bio = "By recording and charting data from the game, we were able to tune item prices, adjust challenge difficulty, and change monetary rewards. Without this exhaustive process the game would probably have been unplayable."

[[author_bio]]
id = "131242"
bio = "4. Solo scenario meltdown. When we started work on Rise of Nations , we assumed that the single-player game would feature classic RTS-style linked scenarios that followed a nation's history over time. However, we started work on those scenarios and found that they just weren't particularly appropriate for our subject matter - it's not a lot of fun to take a game about all of history and then constrain players to a smaller canvas and scope…"

[[author_bio]]
id = "130737"
bio = "The company’s first project was Alien Logic , an action/RPG based upon SkyRealms of Jorune , a paper-and-pencil role-playing game designed by the company’s founder, Andrew Leker. Mind Control Software has historically split its time between development for hire and its own independent aspirations. Oasis fit squarely into the latter and eventually saw the light of day in April 2005, with PlayFirst as its publisher."

[[author_bio]]
id = "131140"
bio = "[Published in edited form in the June/July issue of sister magazine Game Developer with magazine-exclusive concept art, Gamasutra is proud to present the full, extended postmortem for Quantic Dream's fascinating Indigo Prophecy / Fahrenheit , as described by creator David Cage.]"

[[author_bio]]
id = "130238"
bio = "The first draft was an extremely basic overview accompanied by various menu and GUI details, and was naturally often lacking when it came to fine detail. I took great pains to sift through the documentation for countless other applications. My end result was a hybrid of various techniques and structures which seemed to stand out and work well, but the end result took far longer than the weekend I had originally (and rather naively) penciled-in. 'FishEd' DEVELOPER: Andy Roberts, Scary Fish Ltd."

[[author_bio]]
id = "132168"
bio = "[Gamasutra is proud to be publishing notable Game Developer magazine postmortems online for the first time - starting with project lead Finley revealing the creation of 2K Boston/Australia's seminal BioShock.]"

[[author_bio]]
id = "132183"
bio = "[As has been widely discussed, developing a successful indie title for Xbox Live Arcade is not the simple task it appears at first blush. Here, ex-EA developer Ahmed Usman Khalid candidly discusses the successes and difficulties that arose in the development of the somewhat overlooked Go! Go! Break Steady , a rhythm/puzzle hybrid game with hip-hop flair.]"

[[author_bio]]
id = "132258"
bio = "Article written by Michaël Samyn between May 21 and November 2, 2008. The interviews with Laura Raines Smith, Gerry De Mol, and Kris Force which follow, as appendices, were conducted via email and rearranged a bit for the sake of storytelling."

[[author_bio]]
id = "132296"
bio = "That's why, when my brother Paul Stevens and I started RiverMan Media, the first thing we did was ensure that we had a development platform that abstracted our game code away from low-level bits and bytes."

[[author_bio]]
id = "132401"
bio = "We naturally wanted everything to look cool and modern, but \"cool\" is subjective, so strong direction was a necessity -- so, as the animation director, Tatsuya Kando had to take a trip to Kyoto to visit Jupiter every week to check on how things were going."

[[author_bio]]
id = "132604"
bio = "My name is Justin Ficarrotta (or just \"Fic\"), game designer/programmer at Freeverse, Inc. in Brooklyn. My background is in action- and style-heavy arcade games, such as the Freeverse-published Kill Monty or my indie efforts Kill Dr. Coté (from which Kill Monty was born) and Laserface Jones vs. Doomsday Odious , which are both award-winning entries in the annual uDevGames contest."

[[author_bio]]
id = "4288"
bio = "[The first was an App Store sensation, but what of its sequel? Ethan Einhorn, Sega's associate creative director on Super Monkey Ball 2 spells out the processes that led to the creation of the second game in the series -- including all the major triumphs and mistakes.]"

[[author_bio]]
id = "4336"
bio = "Magnin & Associates has specialized in handheld platforms since its inception in 1993, but had just switched over to iPhone development in the past year. At the start of this project we had a couple of previous games in the App Store, with an additional free version."

[[author_bio]]
id = "5902"
bio = "The Path was released on March 18, 2009, from Tale of Tales , Steam and Direct2Drive simultaneously. Since then, our Little Red Riding Hood-inspired horror video game has met with both mean-spirited criticism and over-the-top adoration, and not much in between -- a divisive title if there ever was one. And most definitely a breathtaking journey and a deeply personal experience for Auriea Harvey & Michaël Samyn, yours truly, designers of The Path ."

[[author_bio]]
id = "6184"
bio = "We wrote the tool set we'd always wished we'd had, pulled together a small, tight-knit team of talented contractors, and delivered a well-received sequel to one of the most beloved franchises in arcade racing history. We delivered it on schedule, and on budget. And to top it all off our game was selected for the Summer of Arcade."

[[author_bio]]
id = "6202"
bio = "Jeremy Mahler: It was early in the project and we had just submitted a build to Spike which had a knight and ninja running around in a Roman-style coliseum, where players could hack away at each other until one warrior died. We weren't really happy with we were seeing, so we called a team meeting to discuss the build and the game in general."

[[author_bio]]
id = "6250"
bio = "[ Enthusiastic independent developer and Xbox Live Indie Games repeat offender Nathan Fouts (Weapon Of Choice) comes back with a postmortem of Explosionade, a game conceived to be developed in one month to help with cash flow for his studio's efforts in developing larger titles .]"

[[author_bio]]
id = "6310"
bio = "The concept design team was just two people -- myself (head of games, Paul Croft) and writer Jim Griffiths, who was also producer. We initially started out with the vertical platforming mechanic and went through a few themes before we hit on the core idea of Monsters (Probably) Stole My Princess ."

[[author_bio]]
id = "6315"
bio = "Here are some of the notable successes and challenges that occurred during the development and localization process, as recollected by Okamiden director Kuniomi Matsushita and producer Motohideo Eshiro."

[[author_bio]]
id = "134717"
bio = "I met Tommy Refenes in 2008. I've worked with a lot of programmers over the years, and my past artist/programmer relationships were always a bit alien. Working with Tommy felt a lot like hanging out with my best friend in junior high, nerding out and going off on tangents that would annoy just about everyone around us. I knew right away that whatever we decided to work on together would be fun, and this was how Super Meat Boy got made."

[[author_bio]]
id = "6407"
bio = "[ In this comprehensive postmortem, former Volition developer Luke Schneider talks about how he went indie and assaulted the Xbox Live Indie Games market with an array of games built on the same ideal -- and how each worked, as well as the fate of the overall project .]"

[[author_bio]]
id = "6412"
bio = "Casey's Contraptions is an iOS game created by the two of us, Noel Llopis and Miguel Ángel Friginal. Noel, an industry veteran for over a decade, turned indie over four years ago and found success with microtransaction-based Flower Garden on iOS. Miguel worked as a graphic designer in the advertising industry for years before becoming a web developer. Casey's Contraptions is his first published video game, although his first paper role playing game came out almost 20 years ago."

[[author_bio]]
id = "6472"
bio = "[ In this candid and thoughtful postmortem, Arrowhead Game Studios CEO Johan Pilestedt describes the haphazard \"process\" behind the Sweden-based development of the PC game Magicka , showing how lack of experience can lead to pitfalls, even when you have the best advice .]"

[[author_bio]]
id = "6481"
bio = "I hesitate to say we've got this small-studio thing figured out. But at least for the foreseeable future we have enough work to remain stable. And right now stability feels really good."

[[author_bio]]
id = "6498"
bio = "[ In this revealing postmortem of The Adventures of Shuggy , Smudged Cat Games' David Johnston reveals how working with the best of intentions and inspiration can have a bad commercial result when the cards fall in the wrong places creatively and business-wise .]"

[[author_bio]]
id = "168921"
bio = "[ What happens when a developer that was born in the iOS space transitions to making games for consoles? In this postmortem, Simon Oliver, founder of HandCircus (Rolando series) shares the experience of moving to PlayStation 3 development with Okabu . ]"

[[author_bio]]
id = "169969"
bio = "The business guy and programmer, Rami Ismail, was confronted with a mall shooting and was robbed at knifepoint just last year, and we realized that the world around us seems to have roughened up a bit. It's not something we can easily ignore or keep out of our heads. Violence -- mainly fake aggression -- is something we weren't used to seeing."

[[author_bio]]
id = "172250"
bio = "[ Zach Barth, developer of the cult indie puzzle hit SpaceChem explains what went into creating such a complex, nuanced game -- while still working a day job -- and also what held back the game from finding the audience it might otherwise have found. ]"

[[author_bio]]
id = "173453"
bio = "Only three programmers have worked on Zack Zero , all of whom were partners in the company: Carlos and Nacho Abril, studio co-founders, and Diego Garcés, who helped us with the enemy AI."

[[author_bio]]
id = "180520"
bio = "Needless to say, after spending so long on the game, I'd lost nearly all objectivity. But seeing so many people playing and enjoying the game was one of the most validating moments of the game's development for me. Also, after working with him for over a year via Steam Chat by that point, I finally got to meet my co-writer, Alex Kain, in person. Between that and hanging out with my partners at Microsoft, it was a fantastic show."

[[author_bio]]
id = "181082"
bio = "The cut didn't hurt gameplay too much, we felt, because we were able to rewrite the story (we were still in pre-production, remember) and have Dante show up toward the end of the game with an army of mercenaries. The mercs provided combat scenarios that contrasted nicely with Guerro's thugs. The mercs had better and more powerful weapons, flak jackets, and they looked different: more military, more organized…"

[[author_bio]]
id = "185535"
bio = "The popular \"inverted tower defense\" game was the first created by 11 Bit Studios, a team of Polish veteran developers. Here, Paweł Miechowski, the studio's senior writer, talks about the difficulties and successes of booting up and building a game at the same time."

[[author_bio]]
id = "193695"
bio = "Whitney Wade and Chacko Sonny are the senior producer and director, respectively, for internal development at Sony Santa Monica."

[[author_bio]]
id = "194852"
bio = "In this reprint from the August 2002 issue of Game Developer magazine , Spider-Man developer Jamie Fristrom writes about what went right and what went wrong with the game's development process. Fristrom's current project, Energy Hook , strongly builds upon some of the design principles first explored here and in Spider-Man 2 ."

[[author_bio]]
id = "195143"
bio = "In this reprint from the October 2005 issue of Game Developer magazine , Resident Evil 4 cinematics lead Yoshiaki Hirabayashi writes about the overhauls and challenges which faced one of the franchise's most notable entries."
