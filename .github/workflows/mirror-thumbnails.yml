name: Mirror thumbnails

# Mirror remote (Wayback) thumbnails into data/thumbs/ so Pages serves them
# itself. The script is a permanent cache — it only fetches images not already
# mirrored — so re-runs are cheap and idempotent.
#
# Wayback soft-blocks a runner after a short burst, so we trickle: a small batch
# per run, backing off and stopping cleanly when blocked. While Wayback is happy
# the run re-dispatches itself to drain a backlog fast; when blocked it stops and
# a later run resumes. This is the incremental catch-up for thumbnails added to
# the dataset (the original bulk backfill was run from a non-GitHub host, since
# Wayback blocks Actions IPs harder — see scraper/cache_thumbnails.py). Because a
# GITHUB_TOKEN push doesn't trigger pages.yml, we dispatch the Pages deploy by
# hand once we've committed.
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"   # weekly backstop (Mon 04:00 UTC); push/dispatch handle the rest

permissions:
  contents: write
  actions: write            # to re-dispatch this workflow while work remains

# Serialise runs so the auto-commit/push can't race a chained or cron run.
concurrency:
  group: mirror-thumbnails
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 20      # a Wayback hang can't tie up a runner indefinitely
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pillow tomli-w
      - id: mirror
        run: python scraper/cache_thumbnails.py --limit 8 --delay 10
      - id: commit
        name: Commit newly mirrored thumbnails
        run: |
          if [ -z "$(git status --porcelain data/thumbs data/postmortems.toml data/blog_curation.toml)" ]; then
            echo "No new thumbnails to mirror."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/thumbs data/postmortems.toml data/blog_curation.toml
          git commit -m "Mirror thumbnails into the repo (automated)"
          # rebase onto any commit that landed mid-run, then push, retrying a
          # couple of times if origin moves again under us
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push \
              && { echo "committed=true" >> "$GITHUB_OUTPUT"; exit 0; }
            echo "push attempt $attempt failed; retrying"
            sleep 5
          done
          echo "could not push after retries" >&2
          exit 1
      - name: Chain another run while the backlog drains
        if: steps.mirror.outputs.blocked == 'false' && steps.mirror.outputs.mirrored != '0' && steps.mirror.outputs.remaining != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "${{ steps.mirror.outputs.remaining }} remaining; dispatching the next batch."
          gh workflow run mirror-thumbnails.yml --ref main
      - name: Deploy Pages with the new thumbnails
        # our own commit's push won't trigger pages.yml (GITHUB_TOKEN), and we
        # only deploy on the terminal run of a drain (i.e. when not chaining),
        # so a multi-batch backfill redeploys once at the end rather than N times
        if: steps.commit.outputs.committed == 'true' && !(steps.mirror.outputs.blocked == 'false' && steps.mirror.outputs.mirrored != '0' && steps.mirror.outputs.remaining != '0')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
